<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Painel TPE</title>

  <link rel="stylesheet" href="login.css">
</head>

<body>

<div id="telaLogin" class="quadro-centralizado">

  <h3 class="titulo-login">TPE SBC</h3>

  <label>E-mail do usuário:</label>
  <input type="email" id="emailLogin" class="input-login">

  <label>Senha:</label>
  <input type="password" id="senhaLogin" class="input-login">

  <button class="botao-login" onclick="fazerLogin()">Entrar</button>

  <p id="msgLogin" class="mensagem"></p>

</div>

<div id="conteudoProtegido" style="display:none;">
  <h2>Área logada</h2>
</div>

<script src="login.js"></script>

</body>
</html>
